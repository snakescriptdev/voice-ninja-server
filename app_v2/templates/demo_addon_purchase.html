<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add-on Coin Purchase Demo</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        #log {
            margin-top: 30px;
            padding: 15px;
            background-color: #1e1e1e;
            color: #dcdcdc;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            white-space: pre-wrap;
            height: 300px;
            overflow-y: auto;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .bundle-info {
            background-color: #e8f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #3498db;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Add-on Coin Purchase Demo</h2>

        <div class="form-group">
            <label for="token">JWT Token (Bearer):</label>
            <input type="text" id="token" placeholder="Paste your JWT here...">
        </div>

        <div class="form-group">
            <label for="bundle_id">Bundle ID:</label>
            <input type="number" id="bundle_id" value="1" placeholder="Enter Bundle ID">
        </div>

        <div class="bundle-info" id="bundleDisplay">
            Enter a Bundle ID to see details (simulated info will appear here after clicking Initiate)
        </div>

        <button id="checkoutBtn">Initiate Checkout with Razorpay</button>

        <h3>Logs</h3>
        <div id="log"></div>
    </div>

    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.textContent += `[${timestamp}] ` + (typeof message === 'object' ? JSON.stringify(message, null, 2) : message) + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('checkoutBtn').addEventListener('click', async () => {
            const token = document.getElementById('token').value.trim();
            const bundleId = parseInt(document.getElementById('bundle_id').value);

            if (!token) {
                alert("Please enter a JWT token.");
                return;
            }

            if (isNaN(bundleId)) {
                alert("Please enter a valid Bundle ID.");
                return;
            }

            try {
                // 1. Create Order
                log(`Calling /api/v2/coin-purchase/create-order for bundle ${bundleId}...`);
                const createRes = await fetch('/api/v2/coin-purchase/create-order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ bundle_id: bundleId })
                });

                const createData = await createRes.json();

                if (!createRes.ok) {
                    throw new Error(createData.detail || 'Failed to create order');
                }
                log('Order created successfully:');
                log(createData);

                document.getElementById('bundleDisplay').innerHTML = `
                    <strong>Item:</strong> ${createData.bundle_name}<br>
                    <strong>Amount:</strong> ${createData.amount} ${createData.currency}<br>
                    <strong>Order ID:</strong> ${createData.order_id}
                `;

                // 2. Open Razorpay Checkout
                const options = {
                    key: createData.key_id,
                    amount: createData.amount * 100, // Razorpay expects paisa
                    currency: createData.currency,
                    name: "Voice Ninja Add-ons",
                    description: `Purchase ${createData.bundle_name}`,
                    order_id: createData.order_id,
                    handler: async function (response) {
                        log("Razorpay Checkout Success Response:");
                        log(response);

                        // 3. Verify Payment
                        try {
                            log('Calling /api/v2/coin-purchase/verify-payment...');
                            const verifyRes = await fetch('/api/v2/coin-purchase/verify-payment', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify({
                                    razorpay_order_id: response.razorpay_order_id,
                                    razorpay_payment_id: response.razorpay_payment_id,
                                    razorpay_signature: response.razorpay_signature,
                                    bundle_id: bundleId
                                })
                            });

                            const verifyData = await verifyRes.json();
                            if (!verifyRes.ok) {
                                throw new Error(verifyData.detail || 'Failed to verify payment');
                            }
                            log('Payment verified and coins credited!');
                            log(verifyData);
                            alert("Payment successful! Your coins have been added.");
                        } catch (err) {
                            log('Error verifying payment: ' + err.message);
                            alert('Payment verification failed. Please check logs.');
                        }
                    },
                    prefill: {
                        name: "Test User",
                        email: createData.user_email || "user@example.com",
                        contact: createData.user_phone || "9876543210"
                    },
                    theme: {
                        color: "#3498db"
                    },
                    modal: {
                        ondismiss: function () {
                            log("Checkout modal closed by user.");
                        }
                    }
                };

                const rzp = new Razorpay(options);
                rzp.on('payment.failed', function (response) {
                    log("Payment Failed Event:");
                    log(response.error);
                });
                rzp.open();

            } catch (err) {
                log('Error initiating purchase: ' + err.message);
                alert('Initialization failed. Check logs.');
            }
        });
    </script>
</body>

</html>
